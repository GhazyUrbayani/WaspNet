databases:
  - name: waspnet-db
    databaseName: waspnet
    user: waspnet
    plan: free

services:
  - type: redis
    name: waspnet-redis
    plan: free
    ipAllowList: [] # Mengizinkan koneksi internal Render

  - type: web
    name: waspnet-api
    env: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waspnet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: waspnet-redis
          property: connectionString
      # Variabel di bawah ini harus kamu isi manual di Dashboard Render nanti
      - key: SIM_API_KEY
        sync: false 
      - key: SIM_BASE_URL
        value: https://api.sim.dune.com/v1
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: worker
    name: waspnet-celery-worker
    env: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.alert_worker worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waspnet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: waspnet-redis
          property: connectionString
      - key: SIM_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
