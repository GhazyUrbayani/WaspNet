version: "3.9"

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: chainradar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chainradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chainradar_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chainradar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainradar"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching, pub/sub, rate limiting
  redis:
    image: redis:7-alpine
    container_name: chainradar-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: chainradar-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-chainradar}:${POSTGRES_PASSWORD:-chainradar_dev}@db:5432/${POSTGRES_DB:-chainradar}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery worker for background alert processing
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: chainradar-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-chainradar}:${POSTGRES_PASSWORD:-chainradar_dev}@db:5432/${POSTGRES_DB:-chainradar}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: celery -A workers.alert_worker worker --loglevel=info --concurrency=4

  # Next.js frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: chainradar-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
